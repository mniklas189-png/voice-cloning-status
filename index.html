<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0e16">
    <meta name="description" content="Voice Cloning Studio">
    <title>Voice Cloning Studio</title>
    <link rel="stylesheet" href="style.css?v=2">
  </head>
  <body>
    <main class="studio-shell">
      <div class="connection-toolbar" aria-label="Verbindungsstatus">
        <div id="status-pill" class="status-pill checking" role="status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="status-label">Wird geprüft …</span>
        </div>
        <button id="refresh-status" class="status-button" type="button">
          <span aria-hidden="true">↻</span> Status prüfen
        </button>
      </div>

      <header class="studio-hero">
        <h1>🎙️ Voice Cloning Studio</h1>
        <p><strong>Qwen3-TTS – läuft auf deiner GPU</strong> · Stimmprobe hochladen → Text eingeben → Generieren → im Editor feinschneiden</p>
      </header>

      <section class="connection-panel" aria-labelledby="panel-title">
        <div class="panel-icon" aria-hidden="true">
          <span class="status-dot"></span>
        </div>
        <div>
          <span class="panel-kicker">Verbindungsstatus</span>
          <h2 id="panel-title">Studio wird gesucht …</h2>
          <p id="panel-copy">Die Verbindung zu deinem PC wird geprüft.</p>
        </div>
      </section>
    </main>

    <script src="app.js?v=3" defer></script>
  </body>
</html>
